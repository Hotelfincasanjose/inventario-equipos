<!DOCTYPE html>
<html>
<head>
<title>Inventario Equipos</title>
</head>

<body>

<h1>Inventario de equipos</h1>

<h3>1. Descargar herramienta</h3>

<a href="InventarioPC.bat" download>
<button>
Descargar BAT
</button>
</a>


<hr>


<h3>2. Subir archivos</h3>

<input type="file" id="archivos" multiple>

<br><br>

<button onclick="subirArchivos()">
Enviar archivos
</button>

<p id="estado"></p>


<script>

function subirArchivos(){

let archivos = document.getElementById("archivos").files;

if(archivos.length == 0){

document.getElementById("estado").innerHTML =
"No hay archivos seleccionados";

return;

}

document.getElementById("estado").innerHTML =
"Botón funcionando. Archivos seleccionados: "
+ archivos.length;

}

</script>


</body>
</html>
